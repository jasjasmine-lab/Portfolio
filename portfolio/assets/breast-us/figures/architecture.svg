<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Decoupled dual-backbone architecture with weight-copy transfer">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f7f9"/>
      <stop offset="100%" stop-color="#eef2f6"/>
    </linearGradient>

    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1220" flood-opacity="0.14"/>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#1f2937"/>
    </marker>

    <style><![CDATA[
      .title{font: 700 30px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#0b1220;}
      .subtitle{font: 500 14px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#475569;}
      .h{font: 800 14px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; letter-spacing:.08em; text-transform:uppercase; fill:#0b1220;}
      .t{font: 650 16px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#0b1220;}
      .s{font: 500 13px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#475569;}
      .mono{font: 650 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill:#334155;}

      .box{fill:url(#card); stroke:#cbd5e1; stroke-width:1.2; filter:url(#shadow);}
      .pill{fill:#ffffff; stroke:#cbd5e1; stroke-width:1.1;}

      .cls{fill:#eff6ff; stroke:#93c5fd;}
      .seg{fill:#ecfdf5; stroke:#86efac;}
      .head{fill:#f0fdfa; stroke:#5eead4;}
      .shared{fill:#f8fafc; stroke:#cbd5e1;}

      .link{stroke:#1f2937; stroke-width:2.2; stroke-linecap:round; marker-end:url(#arrow);}
      .split{stroke:#334155; stroke-width:2; stroke-linecap:round;}
      .dashed{stroke:#94a3b8; stroke-width:2; stroke-linecap:round; stroke-dasharray:8 8; marker-end:url(#arrow);}
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="800" y="62" text-anchor="middle" class="title">Dual-Backbone Decoupled Network (ViT-UNet)</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">Cross-domain BUSBRA → BUSI · classification + segmentation (mask + edge)</text>

  <!-- Input -->
  <rect x="70" y="180" width="230" height="250" rx="18" class="box"/>
  <text x="185" y="218" text-anchor="middle" class="h">Input</text>
  <rect x="110" y="242" width="150" height="150" rx="16" class="shared"/>
  <text x="185" y="320" text-anchor="middle" class="t">BUS image</text>
  <text x="185" y="342" text-anchor="middle" class="s">resize → 224×224</text>

  <!-- Split node -->
  <circle cx="345" cy="305" r="9" fill="#0f172a" opacity="0.9"/>
  <line x1="300" y1="305" x2="336" y2="305" class="link"/>

  <!-- Branch labels -->
  <rect x="400" y="155" width="760" height="46" rx="14" class="pill"/>
  <text x="780" y="186" text-anchor="middle" class="t" fill="#1e40af">Classification branch (frozen)</text>

  <rect x="400" y="468" width="980" height="46" rx="14" class="pill"/>
  <text x="890" y="499" text-anchor="middle" class="t" fill="#166534">Segmentation branch (weight-copy + UNet)</text>

  <!-- Vertical splitter lines -->
  <line x1="354" y1="305" x2="400" y2="305" class="split"/>
  <line x1="400" y1="305" x2="400" y2="215" class="split"/>
  <line x1="400" y1="305" x2="400" y2="545" class="split"/>

  <!-- Classification pipeline -->
  <rect x="440" y="225" width="230" height="170" rx="16" class="box cls"/>
  <text x="555" y="262" text-anchor="middle" class="t" fill="#1e40af">ViT-B/16</text>
  <text x="555" y="286" text-anchor="middle" class="s">encoder frozen</text>
  <text x="555" y="322" text-anchor="middle" class="mono">12 blocks · 768-d</text>

  <rect x="720" y="255" width="200" height="110" rx="16" class="box cls"/>
  <text x="820" y="292" text-anchor="middle" class="t">MLP head</text>
  <text x="820" y="318" text-anchor="middle" class="mono">768 → 256 → 2</text>

  <rect x="970" y="238" width="310" height="144" rx="18" class="box shared"/>
  <text x="1125" y="278" text-anchor="middle" class="t">Class probabilities</text>
  <text x="1125" y="306" text-anchor="middle" class="s">benign / malignant</text>
  <rect x="1040" y="322" width="170" height="10" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <rect x="1040" y="322" width="124" height="10" rx="6" fill="#3b82f6"/>
  <text x="1125" y="354" text-anchor="middle" class="mono">example: 0.84 / 0.16</text>

  <line x1="670" y1="310" x2="720" y2="310" class="link"/>
  <line x1="920" y1="310" x2="970" y2="310" class="link"/>

  <!-- Segmentation pipeline -->
  <rect x="440" y="555" width="260" height="250" rx="18" class="box seg"/>
  <text x="570" y="595" text-anchor="middle" class="t" fill="#166534">ViT-B/16</text>
  <text x="570" y="620" text-anchor="middle" class="s">encoder (weight copy)</text>
  <text x="570" y="650" text-anchor="middle" class="mono">init: cls checkpoint</text>
  <text x="570" y="674" text-anchor="middle" class="mono">fine-tune: blocks 8–11</text>
  <text x="570" y="704" text-anchor="middle" class="mono">tokens → 14×14×768</text>

  <rect x="740" y="585" width="220" height="190" rx="18" class="box seg"/>
  <text x="850" y="625" text-anchor="middle" class="t">UNet decoder</text>
  <text x="850" y="650" text-anchor="middle" class="s">4-stage upsampling</text>
  <text x="850" y="682" text-anchor="middle" class="mono">14×14 → 224×224</text>
  <text x="850" y="710" text-anchor="middle" class="mono">conv blocks + upsample</text>

  <rect x="1005" y="585" width="190" height="90" rx="16" class="box head"/>
  <text x="1100" y="622" text-anchor="middle" class="t">Mask head</text>
  <text x="1100" y="648" text-anchor="middle" class="mono">32 → 1</text>

  <rect x="1005" y="705" width="190" height="90" rx="16" class="box head"/>
  <text x="1100" y="742" text-anchor="middle" class="t">Edge head</text>
  <text x="1100" y="768" text-anchor="middle" class="mono">32 → 1</text>

  <rect x="1235" y="575" width="300" height="120" rx="18" class="box shared"/>
  <text x="1385" y="618" text-anchor="middle" class="t">Mask probability</text>
  <text x="1385" y="645" text-anchor="middle" class="s">lesion segmentation</text>
  <rect x="1310" y="662" width="150" height="16" rx="9" fill="#0f172a" opacity="0.08" stroke="#cbd5e1"/>

  <rect x="1235" y="715" width="300" height="120" rx="18" class="box shared"/>
  <text x="1385" y="758" text-anchor="middle" class="t">Edge probability</text>
  <text x="1385" y="785" text-anchor="middle" class="s">boundary map</text>
  <rect x="1310" y="802" width="150" height="16" rx="9" fill="#0f172a" opacity="0.08" stroke="#cbd5e1"/>

  <line x1="700" y1="680" x2="740" y2="680" class="link"/>
  <line x1="960" y1="650" x2="1005" y2="630" class="link"/>
  <line x1="960" y1="720" x2="1005" y2="750" class="link"/>
  <line x1="1195" y1="630" x2="1235" y2="635" class="link"/>
  <line x1="1195" y1="750" x2="1235" y2="775" class="link"/>

  <!-- Visual cue: weight-copy -->
  <path d="M 555 400 C 620 455, 650 500, 520 555" fill="none" class="dashed"/>
  <text x="610" y="452" text-anchor="middle" class="s">weight copy transfer</text>
</svg>

