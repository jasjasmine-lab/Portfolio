<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="Dual-task comparison on BUSI">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1220" flood-opacity="0.10"/>
    </filter>
    <style><![CDATA[
      .title{font: 700 20px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#0b1220;}
      .sub{font: 500 12px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#475569;}
      .panel{fill:#ffffff; stroke:#e2e8f0; stroke-width:1.2; rx:16; filter:url(#shadow);}
      .grid{stroke:#e2e8f0; stroke-width:1;}
      .axis{font: 600 11px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#64748b;}
      .xlabel{font: 600 11px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#334155;}
      .ylabel{font: 600 11px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#334155;}
      .val{font: 700 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill:#111827;}
      .legend{font: 700 11px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#334155;}
      .tag{font: 700 11px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#0b1220; letter-spacing:.08em; text-transform:uppercase;}
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1600" height="520" fill="url(#bg)"/>
  <text x="800" y="34" text-anchor="middle" class="title">Dual-Task Comparison: Classification + Segmentation on BUSI</text>
  <text x="800" y="56" text-anchor="middle" class="sub">(trained on BUSBRA, 5-fold cross-validation)</text>

  <!-- Panels -->
  <rect x="40" y="86" width="1010" height="404" class="panel"/>
  <rect x="1080" y="86" width="480" height="404" class="panel"/>

  <text x="70" y="118" class="tag">(a) Cross-domain performance</text>
  <text x="1100" y="118" class="tag">(b) Trainable parameters</text>

  <!-- Legend (left) -->
  <rect x="80" y="134" width="12" height="10" rx="3" fill="#94a3b8"/><text x="98" y="143" class="legend">Dice</text>
  <rect x="150" y="134" width="12" height="10" rx="3" fill="#cbd5e1"/><text x="168" y="143" class="legend">IoU</text>
  <rect x="212" y="134" width="12" height="10" rx="3" fill="#f6d365"/><text x="230" y="143" class="legend">AUC</text>
  <rect x="286" y="134" width="12" height="10" rx="3" fill="#1d4ed8"/><text x="304" y="143" class="legend">Ours</text>

  <!-- Left chart area -->
  <!-- axis & grid (y: 0.3..1.0) -->
  <line x1="70" y1="420.0" x2="1000" y2="420.0" class="grid"/>
  <text x="60" y="424.0" text-anchor="end" class="axis">0.3</text>
  <line x1="70" y1="377.1" x2="1000" y2="377.1" class="grid"/>
  <text x="60" y="381.1" text-anchor="end" class="axis">0.4</text>
  <line x1="70" y1="334.3" x2="1000" y2="334.3" class="grid"/>
  <text x="60" y="338.3" text-anchor="end" class="axis">0.5</text>
  <line x1="70" y1="291.4" x2="1000" y2="291.4" class="grid"/>
  <text x="60" y="295.4" text-anchor="end" class="axis">0.6</text>
  <line x1="70" y1="248.6" x2="1000" y2="248.6" class="grid"/>
  <text x="60" y="252.6" text-anchor="end" class="axis">0.7</text>
  <line x1="70" y1="205.7" x2="1000" y2="205.7" class="grid"/>
  <text x="60" y="209.7" text-anchor="end" class="axis">0.8</text>
  <line x1="70" y1="162.9" x2="1000" y2="162.9" class="grid"/>
  <text x="60" y="166.9" text-anchor="end" class="axis">0.9</text>
  <line x1="70" y1="120.0" x2="1000" y2="120.0" class="grid"/>
  <text x="60" y="124.0" text-anchor="end" class="axis">1.0</text>

  <!-- Bars (Dice/IoU/AUC) -->
  <!-- U-Net -->
  <rect x="86.3" y="284.6" width="24.9" height="135.4" rx="4" fill="#94a3b8"/><text x="98.7" y="278.6" text-anchor="middle" class="val">0.616</text>
  <rect x="114.2" y="333.7" width="24.9" height="86.3" rx="4" fill="#cbd5e1"/><text x="126.6" y="327.7" text-anchor="middle" class="val">0.501</text>
  <rect x="142.1" y="201.8" width="24.9" height="218.2" rx="4" fill="#f6d365"/><text x="154.5" y="195.8" text-anchor="middle" class="val">0.809</text>
  <text x="128.1" y="446" text-anchor="middle" class="xlabel"><tspan x="128.1" dy="0">U-Net</tspan></text>

  <!-- Att U-Net -->
  <rect x="202.5" y="285.5" width="24.9" height="134.5" rx="4" fill="#94a3b8"/><text x="215.0" y="279.5" text-anchor="middle" class="val">0.614</text>
  <rect x="230.4" y="334.7" width="24.9" height="85.3" rx="4" fill="#cbd5e1"/><text x="242.9" y="328.7" text-anchor="middle" class="val">0.499</text>
  <rect x="258.3" y="192.2" width="24.9" height="227.8" rx="4" fill="#f6d365"/><text x="270.8" y="186.2" text-anchor="middle" class="val">0.832</text>
  <text x="244.4" y="446" text-anchor="middle" class="xlabel">
    <tspan x="244.4" dy="0">Att</tspan>
    <tspan x="244.4" dy="14">U-Net</tspan>
  </text>

  <!-- TransUNet -->
  <rect x="318.8" y="265.4" width="24.9" height="154.6" rx="4" fill="#94a3b8"/><text x="331.2" y="259.4" text-anchor="middle" class="val">0.661</text>
  <rect x="346.7" y="306.6" width="24.9" height="113.4" rx="4" fill="#cbd5e1"/><text x="359.1" y="300.6" text-anchor="middle" class="val">0.565</text>
  <rect x="374.6" y="179.4" width="24.9" height="240.6" rx="4" fill="#f6d365"/><text x="387.0" y="173.4" text-anchor="middle" class="val">0.861</text>
  <text x="360.6" y="446" text-anchor="middle" class="xlabel"><tspan x="360.6" dy="0">TransUNet</tspan></text>

  <!-- UNETR -->
  <rect x="435.0" y="348.3" width="24.9" height="71.7" rx="4" fill="#94a3b8"/><text x="447.5" y="342.3" text-anchor="middle" class="val">0.467</text>
  <rect x="462.9" y="396.9" width="24.9" height="23.1" rx="4" fill="#cbd5e1"/><text x="475.4" y="390.9" text-anchor="middle" class="val">0.354</text>
  <rect x="490.8" y="223.0" width="24.9" height="197.0" rx="4" fill="#f6d365"/><text x="503.3" y="217.0" text-anchor="middle" class="val">0.760</text>
  <text x="476.9" y="446" text-anchor="middle" class="xlabel"><tspan x="476.9" dy="0">UNETR</tspan></text>

  <!-- SegFormer -->
  <rect x="551.3" y="285.2" width="24.9" height="134.8" rx="4" fill="#94a3b8"/><text x="563.7" y="279.2" text-anchor="middle" class="val">0.615</text>
  <rect x="579.2" y="330.9" width="24.9" height="89.1" rx="4" fill="#cbd5e1"/><text x="591.6" y="324.9" text-anchor="middle" class="val">0.508</text>
  <rect x="607.1" y="175.1" width="24.9" height="244.9" rx="4" fill="#f6d365"/><text x="619.5" y="169.1" text-anchor="middle" class="val">0.871</text>
  <text x="593.1" y="446" text-anchor="middle" class="xlabel"><tspan x="593.1" dy="0">SegFormer</tspan></text>

  <!-- UNet++ -->
  <rect x="667.5" y="274.4" width="24.9" height="145.6" rx="4" fill="#94a3b8"/><text x="680.0" y="268.4" text-anchor="middle" class="val">0.640</text>
  <rect x="695.4" y="321.0" width="24.9" height="99.0" rx="4" fill="#cbd5e1"/><text x="707.9" y="315.0" text-anchor="middle" class="val">0.531</text>
  <rect x="723.3" y="197.5" width="24.9" height="222.5" rx="4" fill="#f6d365"/><text x="735.8" y="191.5" text-anchor="middle" class="val">0.819</text>
  <text x="709.4" y="446" text-anchor="middle" class="xlabel"><tspan x="709.4" dy="0">UNet++</tspan></text>

  <!-- DeepLabV3+ -->
  <rect x="783.8" y="262.3" width="24.9" height="157.7" rx="4" fill="#94a3b8"/><text x="796.2" y="256.3" text-anchor="middle" class="val">0.668</text>
  <rect x="811.7" y="306.0" width="24.9" height="114.0" rx="4" fill="#cbd5e1"/><text x="824.1" y="300.0" text-anchor="middle" class="val">0.566</text>
  <rect x="839.6" y="173.4" width="24.9" height="246.6" rx="4" fill="#f6d365"/><text x="852.0" y="167.4" text-anchor="middle" class="val">0.875</text>
  <text x="825.6" y="446" text-anchor="middle" class="xlabel">
    <tspan x="825.6" dy="0">DeepLab</tspan>
    <tspan x="825.6" dy="14">V3+</tspan>
  </text>

  <!-- Ours (Dual-BB) -->
  <rect x="900.0" y="243.8" width="24.9" height="176.2" rx="4" fill="#1d4ed8"/><text x="912.5" y="237.8" text-anchor="middle" class="val">0.711</text>
  <rect x="927.9" y="283.5" width="24.9" height="136.5" rx="4" fill="#60a5fa"/><text x="940.4" y="277.5" text-anchor="middle" class="val">0.619</text>
  <rect x="955.8" y="160.0" width="24.9" height="260.0" rx="4" fill="#10b981"/><text x="968.3" y="154.0" text-anchor="middle" class="val">0.907</text>
  <text x="941.9" y="446" text-anchor="middle" class="xlabel">
    <tspan x="941.9" dy="0">Ours</tspan>
    <tspan x="941.9" dy="14">(Dual-BB)</tspan>
  </text>

  <!-- Right chart: trainable params (M) -->
  <text x="1100" y="142" class="sub">Total trainable parameters (millions)</text>
  <line x1="1080" y1="410" x2="1540" y2="410" class="grid"/>
  <text x="1080" y="430" class="axis">0</text>
  <text x="1310" y="430" text-anchor="middle" class="axis">50</text>
  <text x="1540" y="430" text-anchor="end" class="axis">100</text>

  <!-- rows sorted by size desc -->
  <text x="1070" y="170.0" text-anchor="end" class="ylabel">UNETR</text>
  <rect x="1080" y="158.0" width="403.4" height="20.5" rx="6" fill="#94a3b8"/><text x="1491.4" y="170.0" class="val">87.7M</text>

  <text x="1070" y="202.5" text-anchor="end" class="ylabel">TransUNet</text>
  <rect x="1080" y="190.5" width="243.3" height="20.5" rx="6" fill="#94a3b8"/><text x="1331.3" y="202.5" class="val">52.9M</text>

  <text x="1070" y="235.0" text-anchor="end" class="ylabel">DeepLabV3+</text>
  <rect x="1080" y="223.0" width="188.1" height="20.5" rx="6" fill="#94a3b8"/><text x="1276.1" y="235.0" class="val">40.9M</text>

  <text x="1070" y="267.5" text-anchor="end" class="ylabel">UNet++</text>
  <rect x="1080" y="255.5" width="173.9" height="20.5" rx="6" fill="#94a3b8"/><text x="1261.9" y="267.5" class="val">37.8M</text>

  <text x="1070" y="300.0" text-anchor="end" class="ylabel">Att U-Net</text>
  <rect x="1080" y="288.0" width="145.8" height="20.5" rx="6" fill="#94a3b8"/><text x="1233.8" y="300.0" class="val">31.7M</text>

  <text x="1070" y="332.5" text-anchor="end" class="ylabel">U-Net</text>
  <rect x="1080" y="320.5" width="144.0" height="20.5" rx="6" fill="#94a3b8"/><text x="1232.0" y="332.5" class="val">31.3M</text>

  <text x="1070" y="365.0" text-anchor="end" class="ylabel">SegFormer</text>
  <rect x="1080" y="353.0" width="20.2" height="20.5" rx="6" fill="#94a3b8"/><text x="1108.2" y="365.0" class="val">4.4M</text>

  <text x="1070" y="397.5" text-anchor="end" class="ylabel">Ours</text>
  <rect x="1080" y="385.5" width="19.3" height="20.5" rx="6" fill="#1d4ed8"/><text x="1107.3" y="397.5" class="val">4.2M</text>
</svg>

