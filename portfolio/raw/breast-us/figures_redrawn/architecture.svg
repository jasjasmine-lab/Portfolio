<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Dual-backbone dual-task architecture">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f7f9"/>
      <stop offset="100%" stop-color="#eef2f6"/>
    </linearGradient>

    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1220" flood-opacity="0.14"/>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#1f2937"/>
    </marker>

    <style><![CDATA[
      .title{font: 700 30px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#0b1220;}
      .subtitle{font: 500 14px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#475569;}
      .h{font: 700 16px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; letter-spacing:.08em; text-transform:uppercase; fill:#0b1220;}
      .t{font: 600 16px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#0b1220;}
      .s{font: 500 13px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#475569;}
      .k{font: 600 12px Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; fill:#334155;}
      .mono{font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill:#334155;}

      .box{fill:url(#card); stroke:#cbd5e1; stroke-width:1.2; filter:url(#shadow);}
      .pill{fill:#ffffff; stroke:#cbd5e1; stroke-width:1.1;}

      .cls{fill:#eff6ff; stroke:#93c5fd;}
      .seg{fill:#ecfdf5; stroke:#86efac;}
      .edge{fill:#f0fdfa; stroke:#5eead4;}
      .shared{fill:#f8fafc; stroke:#cbd5e1;}

      .link{stroke:#1f2937; stroke-width:2.2; stroke-linecap:round; marker-end:url(#arrow);}
      .split{stroke:#334155; stroke-width:2; stroke-linecap:round;}
      .dashed{stroke:#94a3b8; stroke-width:2; stroke-linecap:round; stroke-dasharray:8 8; marker-end:url(#arrow);}
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="800" y="62" text-anchor="middle" class="title">Dual-Backbone Dual-Task Network</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">Breast Ultrasound • Classification + Segmentation (Mask + Edge)</text>

  <!-- Input -->
  <rect x="70" y="170" width="220" height="250" rx="18" class="box"/>
  <text x="180" y="208" text-anchor="middle" class="h">Input</text>
  <rect x="105" y="228" width="150" height="150" rx="16" class="shared"/>
  <text x="180" y="310" text-anchor="middle" class="t">BUS image</text>
  <text x="180" y="332" text-anchor="middle" class="s">resize → 224×224</text>

  <!-- Split node -->
  <circle cx="340" cy="295" r="9" fill="#0f172a" opacity="0.9"/>
  <line x1="290" y1="295" x2="331" y2="295" class="link"/>

  <!-- Branch labels -->
  <rect x="390" y="145" width="720" height="46" rx="14" class="pill"/>
  <text x="750" y="176" text-anchor="middle" class="t" fill="#1e40af">Classification branch (frozen)</text>

  <rect x="390" y="458" width="920" height="46" rx="14" class="pill"/>
  <text x="850" y="489" text-anchor="middle" class="t" fill="#166534">Segmentation branch (partially trainable)</text>

  <!-- Vertical splitter lines -->
  <line x1="349" y1="295" x2="390" y2="295" class="split"/>
  <line x1="390" y1="295" x2="390" y2="205" class="split"/>
  <line x1="390" y1="295" x2="390" y2="530" class="split"/>

  <!-- Classification pipeline -->
  <rect x="430" y="215" width="210" height="170" rx="16" class="box cls"/>
  <text x="535" y="252" text-anchor="middle" class="t" fill="#1e40af">ViT-B/16</text>
  <text x="535" y="276" text-anchor="middle" class="s">encoder frozen</text>
  <text x="535" y="312" text-anchor="middle" class="mono">12 blocks • 768-d</text>

  <rect x="700" y="245" width="190" height="110" rx="16" class="box cls"/>
  <text x="795" y="283" text-anchor="middle" class="t">MLP</text>
  <text x="795" y="308" text-anchor="middle" class="mono">768 → 256 → 2</text>

  <rect x="950" y="228" width="270" height="144" rx="18" class="box shared"/>
  <text x="1085" y="268" text-anchor="middle" class="t">Class probabilities</text>
  <text x="1085" y="296" text-anchor="middle" class="s">benign / malignant</text>
  <rect x="1000" y="312" width="170" height="10" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <rect x="1000" y="312" width="130" height="10" rx="6" fill="#3b82f6"/>
  <text x="1085" y="344" text-anchor="middle" class="k">example: 85% / 15%</text>

  <line x1="640" y1="300" x2="700" y2="300" class="link"/>
  <line x1="890" y1="300" x2="950" y2="300" class="link"/>

  <!-- Segmentation pipeline -->
  <rect x="430" y="540" width="330" height="240" rx="18" class="box seg"/>
  <text x="595" y="580" text-anchor="middle" class="t" fill="#166534">EfficientNet-B0</text>
  <text x="595" y="604" text-anchor="middle" class="s">backbone (partial train)</text>
  <text x="595" y="640" text-anchor="middle" class="mono">multi-scale features: C2–C4</text>

  <rect x="800" y="575" width="170" height="170" rx="18" class="box seg"/>
  <text x="885" y="615" text-anchor="middle" class="t">FPN</text>
  <text x="885" y="640" text-anchor="middle" class="s">top-down + lateral</text>
  <text x="885" y="670" text-anchor="middle" class="mono">P2–P4 (64 ch)</text>

  <rect x="1020" y="565" width="170" height="90" rx="16" class="box edge"/>
  <text x="1105" y="602" text-anchor="middle" class="t">Edge head</text>
  <text x="1105" y="628" text-anchor="middle" class="mono">64 → 32 → 1</text>

  <rect x="1020" y="685" width="170" height="90" rx="16" class="box seg"/>
  <text x="1105" y="722" text-anchor="middle" class="t">Mask head</text>
  <text x="1105" y="748" text-anchor="middle" class="mono">64 → 32 → 1</text>

  <rect x="1240" y="542" width="290" height="120" rx="18" class="box shared"/>
  <text x="1385" y="585" text-anchor="middle" class="t">Edge probability</text>
  <text x="1385" y="612" text-anchor="middle" class="s">boundary-focused map</text>
  <rect x="1305" y="628" width="160" height="18" rx="10" fill="#0f172a" opacity="0.08" stroke="#cbd5e1"/>

  <rect x="1240" y="682" width="290" height="120" rx="18" class="box shared"/>
  <text x="1385" y="725" text-anchor="middle" class="t">Mask probability</text>
  <text x="1385" y="752" text-anchor="middle" class="s">lesion segmentation</text>
  <rect x="1305" y="768" width="160" height="18" rx="10" fill="#0f172a" opacity="0.08" stroke="#cbd5e1"/>

  <line x1="760" y1="660" x2="800" y2="660" class="link"/>
  <line x1="970" y1="625" x2="1020" y2="610" class="link"/>
  <line x1="970" y1="695" x2="1020" y2="720" class="link"/>
  <line x1="1190" y1="610" x2="1240" y2="602" class="link"/>
  <line x1="1190" y1="730" x2="1240" y2="742" class="link"/>

  <!-- Visual cue: skip connections -->
  <path d="M 535 405 C 720 405, 840 405, 885 560" fill="none" class="dashed"/>
  <text x="710" y="424" text-anchor="middle" class="s">skip / feature sharing (illustrative)</text>
</svg>

